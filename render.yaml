services:
  # Backend Web Service
  - type: web
    name: care-companion-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: mongodb+srv://test:VLefFSpRt7Ih8M1W@cluster0.isbq290.mongodb.net/LIOHNS?appName=Cluster0 # Set this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CL_CLOUD_NAME
        sync: dt1vudtwp
      - key: CL_API_KEY
        sync: 911269952868956
      - key: CL_API_SECRET
        sync: kmC8PIQTqvyGkiCRhMBwwQNGW2k

  # Frontend Static Site
  - type: static
    name: care-companion-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://life-care-backend-xzfk.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
